{% extends 'games/base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div style="background:#1a1a1a; padding:30px; border-radius:10px; max-width:400px; border:1px solid #222;">
    <h1 style="margin-bottom:20px; color:#6c3aed;">📝 Регистрация</h1>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <label style="display:block; margin:15px 0 5px; color:#aaa;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p style="color:#e74c3c; font-size:13px;">{{ field.errors }}</p>{% endif %}
        {% endfor %}
        <button type="submit" style="margin-top:20px; width:100%; padding:12px; background:#6c3aed; color:white; border:none; border-radius:6px; font-size:16px; cursor:pointer;">Зарегистрироваться</button>
    </form>
    <p style="margin-top:15px; text-align:center; color:#aaa;">Уже есть аккаунт? <a href="/accounts/login/" style="color:#6c3aed;">Войти</a></p>
</div>
{% endblock %}
