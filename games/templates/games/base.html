<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}GameShop{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0d0d0d; color: white; }
        nav {
            background: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6c3aed;
        }
        .logo { color: white; font-size: 22px; font-weight: bold; text-decoration: none; }
        .logo span { color: #6c3aed; }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 15px;
        }
        .nav-links a:hover { color: #6c3aed; }
        .btn-cart {
            background: #6c3aed;
            color: white !important;
            padding: 6px 14px;
            border-radius: 5px;
            font-weight: bold;
        }
        .content { padding: 30px; max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>
    <nav>
        <a class="logo" href="/games/">Game<span>Shop</span></a>
        <div class="nav-links">
            <a href="/games/">Игры</a>
            {% if user.is_authenticated %}
                <a href="/cart/" class="btn-cart">🛒 Корзина</a>
                <a href="/orders/my/">Заказы</a>
                <span style="color:#aaa; margin-left:20px;">{{ user.username }}</span>
                <a href="/accounts/logout/" style="margin-left:10px; color:#e74c3c;">Выйти</a>
            {% else %}
                <a href="/accounts/login/">Войти</a>
                <a href="/accounts/register/">Регистрация</a>
            {% endif %}
        </div>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
