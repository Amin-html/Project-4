services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: gameshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/gameshop
    depends_on:
      - db

volumes:
  postgres_data: